name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: clippy
        run: nix develop -c cargo clippy -- -D warnings

      - name: test
        run: nix develop -c cargo test

      - name: nix build
        run: nix build
